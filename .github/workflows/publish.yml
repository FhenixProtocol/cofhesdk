name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag for the snapshot (e.g. alpha, next)'
        required: true
        default: 'alpha'

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Create (or update) the Version Packages pull request when PR merged containing a changeset
  version-packages:
    if: ${{ github.event_name == 'push' }}
    name: Version Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure valid pinned npm version (>11.5.1)
        run: npm i -g npm@11.6.2

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Create Release Pull Request
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Manually publish a snapshot from any branch via workflow_dispatch
  alpha-snapshot:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure valid pinned npm version (>11.5.1)
        run: npm i -g npm@11.6.2

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Publish Alpha Snapshot
        run: |
          TAG="${{ github.event.inputs.tag }}"
          changeset version --snapshot "$TAG"
          pnpm -r build
          changeset publish --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish beta snapshots upon merge to master
  beta-snapshot:
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, 'Version Packages') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure valid pinned npm version (>11.5.1)
        run: npm i -g npm@11.6.2

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Publish Beta Snapshot
        run: pnpm run beta:snapshot

  # Publish stable releases when the Version Packages pull request is merged
  stable-release:
    if: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, 'Version Packages') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for tagging

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure valid pinned npm version (>11.5.1)
        run: npm i -g npm@11.6.2

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Publish and Tag with Changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
