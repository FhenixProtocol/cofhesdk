name: Test

on:
  pull_request:
  push:
    branches: [master, staging]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    concurrency:
      group: testnet-integration
      cancel-in-progress: false
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: 1.7.1

      - name: Install Playwright Browsers
        run: cd packages/sdk && pnpm exec playwright install chromium --with-deps

      - name: Validate TEST_PRIVATE_KEY availability
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: |
          if [ -z "$TEST_PRIVATE_KEY" ]; then
            echo "TEST_PRIVATE_KEY secret is not available to this workflow run."
            echo "Common causes:"
            echo "- This workflow was triggered by a pull_request from a fork, where repository secrets are not exposed."
            echo "- The secret was added under a different name, repo, org, or environment."
            echo "- The secret is environment-scoped, but this job does not declare that environment."
            exit 1
          fi

      - name: Run Tests
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: pnpm exec turbo run test --filter='!@cofhe/integration-matrix'

  test-network:
    strategy:
      fail-fast: false
      matrix:
        network:
          - name: Hardhat Mock
            slug: hardhat
          - name: Ethereum Sepolia
            slug: sepolia
            setupChainId: '11155111'
          - name: Arbitrum Sepolia
            slug: arb-sepolia
            setupChainId: '421614'
          - name: Base Sepolia
            slug: base-sepolia
            setupChainId: '84532'
    concurrency:
      group: testnet-integration-${{ matrix.network.slug }}
      cancel-in-progress: false
    name: Test (${{ matrix.network.name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: 1.7.1

      - name: Install Playwright Browsers
        run: cd packages/sdk && pnpm exec playwright install chromium --with-deps

      - name: Validate TEST_PRIVATE_KEY availability
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: |
          if [ -z "$TEST_PRIVATE_KEY" ]; then
            echo "TEST_PRIVATE_KEY secret is not available to this workflow run."
            echo "Common causes:"
            echo "- This workflow was triggered by a pull_request from a fork, where repository secrets are not exposed."
            echo "- The secret was added under a different name, repo, org, or environment."
            echo "- The secret is environment-scoped, but this job does not declare that environment."
            exit 1
          fi

      - name: Setup test fixtures
        if: matrix.network.setupChainId
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}          
        run: pnpm --filter @cofhe/test-setup run setup -- --chains ${{ matrix.network.setupChainId }}

      - name: Run Integration Matrix Tests
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
          MATRIX_CHAIN: ${{ matrix.network.slug }}
        run: pnpm exec turbo run test --filter=@cofhe/integration-matrix
