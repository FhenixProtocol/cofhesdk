name: Test

on:
  pull_request:
  push:
    branches: [master, staging]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Fork PRs run inside the `ci-secrets` environment, which is gated by required reviewers
    # so secrets are only released after a maintainer approves the run. Internal PRs and
    # pushes to master/staging skip the gate and run with the repo-level secret as before.
    environment: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ci-secrets' || '' }}
    steps:
      - name: Debug environment routing
        env:
          K_PRIVATE: ${{ secrets.TEST_PRIVATE_KEY }}
          K_ENVONLY: ${{ secrets.TEST_TEST_TEST }}
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "pr.head.repo.fork=${{ github.event.pull_request.head.repo.fork }}"
          echo "pr.head.repo.full_name=${{ github.event.pull_request.head.repo.full_name }}"
          echo "base.repo.full_name=${{ github.event.pull_request.base.repo.full_name }}"
          echo "resolved_environment=${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ci-secrets' || '(none)' }}"
          echo "TEST_PRIVATE_KEY: length=${#K_PRIVATE}, starts_with_0x=$([ "${K_PRIVATE:0:2}" = "0x" ] && echo true || echo false)"
          echo "TEST_TEST_TEST  : length=${#K_ENVONLY}, starts_with_0x=$([ "${K_ENVONLY:0:2}" = "0x" ] && echo true || echo false)"

      - name: Validate TEST_PRIVATE_KEY availability
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: |
          if [ -z "$TEST_PRIVATE_KEY" ]; then
            echo "::error::TEST_PRIVATE_KEY is not available."
            echo "Fork PRs: confirm the ci-secrets environment has TEST_PRIVATE_KEY set and that a maintainer approved this run."
            echo "Internal runs: confirm the repository-level TEST_PRIVATE_KEY secret exists."
            exit 1
          fi

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Playwright Browsers
        run: cd packages/sdk && pnpm exec playwright install chromium --with-deps

      - name: Run Tests
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: pnpm test
