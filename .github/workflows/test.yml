name: Test

on:
  pull_request:
  push:
    branches: [master, staging]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Playwright Browsers
        run: cd packages/sdk && pnpm exec playwright install chromium --with-deps

      - name: Validate TEST_PRIVATE_KEY availability
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: |
          if [ -z "$TEST_PRIVATE_KEY" ]; then
            echo "TEST_PRIVATE_KEY secret is not available to this workflow run."
            echo "Common causes:"
            echo "- This workflow was triggered by a pull_request from a fork, where repository secrets are not exposed."
            echo "- The secret was added under a different name, repo, org, or environment."
            echo "- The secret is environment-scoped, but this job does not declare that environment."
            exit 1
          fi

      - name: Run Tests
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        run: pnpm test
