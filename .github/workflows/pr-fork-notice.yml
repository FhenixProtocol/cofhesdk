name: Fork PR Notice

# SECURITY NOTE
# -------------
# pull_request_target runs in the base-repo context with a write-capable GITHUB_TOKEN,
# even for PRs from forks. This workflow MUST NOT check out or execute PR code, or
# install untrusted dependencies. Its single responsibility is to post a one-time
# comment via the GitHub API. If you need to run anything from the PR, do it in a
# separate `pull_request` workflow.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

concurrency:
  group: fork-pr-notice-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  notify:
    name: Post fork PR approval notice
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Post one-time approval notice
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cofhe-fork-pr-notice -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            if (comments.some((c) => c.body && c.body.includes(marker))) {
              core.info('Fork PR notice already present, skipping.');
              return;
            }

            const body = [
              marker,
              "Thanks for the contribution!",
              "",
              "GitHub does not expose repository secrets to workflows triggered by pull requests from forks, so the full integration test matrix (which needs a funded testnet `TEST_PRIVATE_KEY`) is gated behind maintainer approval.",
              "",
              "**For maintainers:** review the diff carefully, then click **Approve and run** on the pending workflow in the [Actions tab](" + context.payload.repository.html_url + "/actions). Approval releases the `ci-secrets` environment secrets to this run.",
              "",
              "Force-pushing fixes is fine — re-approval is one click.",
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
