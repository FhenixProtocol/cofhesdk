<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CofheSDK Browser Demo</title>
</head>

<body>
    <main>
        <h1>CofheSDK Browser Demo</h1>
        <p>
            Minimal prompt/alert demo for writing + reading encrypted uint32 on Sepolia.
        </p>

        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0">
            <button id="connect">Connect wallet</button>
            <button id="write">Write encrypted value</button>
            <button id="read">Read & decrypt value</button>
            <button id="setAddress">Set contract address</button>
        </div>

        <pre id="log" style="white-space: pre-wrap; background: #111; color: #ddd; padding: 12px"></pre>
    </main>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
